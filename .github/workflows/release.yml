# Build cross-platform binaries and publish them on the GitHub release when a
# v* tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable, pinned
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: package
        shell: bash
        run: |
          bin=sshvault
          dist="${bin}-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/${bin}" "$dist/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$dist/"
          tar czf "${dist}.tar.gz" "$dist"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"
      - name: upload to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            *.tar.gz
            *.tar.gz.sha256
